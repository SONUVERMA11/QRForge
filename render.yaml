databases:
  - name: qrforge-db
    plan: free
    databaseName: qrforge
    user: qrforge

services:
  - type: web
    name: qrforge-api
    env: node
    plan: free
    rootDir: server
    buildCommand: npm install
    startCommand: node index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: DATABASE_URL
        fromDatabase:
          name: qrforge-db
          property: connectionString
      - key: CLIENT_URL
        value: https://qr-forge-theta.vercel.app
      - key: BASE_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
